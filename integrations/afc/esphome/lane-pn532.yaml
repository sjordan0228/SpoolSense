# =============================================================
# SpoolSense — AFC Lane Scanner (PN532, ESP32-S3-Zero)
# =============================================================
# One ESP32-S3-Zero + one PN532 per BoxTurtle lane.
# Flash one copy of this config per lane — change lane_id,
# friendly_name, static_ip, and gateway before each flash.
#
# Hardware:
#   ESP32-S3-Zero
#   PN532 NFC Module V3 (I2C mode)
#   SDA → GPIO1  |  SCL → GPIO2
#
# PN532 DIP switch settings for I2C mode:
#   Switch 1: ON
#   Switch 2: OFF
#
# How to flash:
#   1. Edit the substitutions block below (lane_id, friendly_name)
#   2. Edit the wifi block (static_ip, gateway, ap ssid/password)
#   3. Go to https://web.esphome.io in Chrome or Edge
#   4. Click "Prepare for first use" → Connect → select serial port
#   5. After base flash, connect to fallback hotspot, enter WiFi creds
#   6. Adopt the device in Home Assistant ESPHome dashboard
#   7. Edit the device config, paste this file, click Install → Wirelessly
#   8. Repeat for each lane
#
# See integrations/afc/docs/setup.md for the full setup guide.
# =============================================================

substitutions:
  lane_id: "lane1"                      # Must match AFC lane name: lane1, lane2, lane3, lane4
  friendly_name: "BoxTurtle Lane 1 NFC" # Update to match lane number

esphome:
  name: "boxturtle-${lane_id}-nfc"
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.X.X  # Set a static IP for this lane's ESP32
    gateway: 192.168.X.1     # Usually your router IP
    subnet: 255.255.255.0
  ap:
    ssid: "SpoolSense-${lane_id} Fallback"
    password: "CHANGE_ME"

captive_portal:

# =============================================================
# Scan lock
# =============================================================
# Prevents re-scanning a spool that is already registered.
# The middleware publishes "lock" to this lane's lock topic
# after a successful spool registration, and "clear" when the
# spool is ejected. Without this, the BoxTurtle's spinning
# respooler would retrigger scans during printing.
globals:
  - id: lane_locked
    type: bool
    initial_value: 'false'

# =============================================================
# MQTT
# =============================================================
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  on_message:
    # Middleware sends "lock" or "clear" to control scan state
    - topic: "nfc/toolhead/${lane_id}/lock"
      then:
        - lambda: |-
            if (x == "lock") {
              id(lane_locked) = true;
              ESP_LOGI("afc", "Lane locked — scanning disabled");
            } else if (x == "clear") {
              id(lane_locked) = false;
              ESP_LOGI("afc", "Lane cleared — scanning resumed");
            }

# =============================================================
# I2C — PN532 on GPIO1/2 (ESP32-S3-Zero standard pins)
# =============================================================
i2c:
  sda: GPIO1
  scl: GPIO2
  frequency: 10000
  scan: true

# =============================================================
# PN532 NFC Reader
# =============================================================
pn532_i2c:
  id: pn532_reader
  on_tag:
    then:
      - if:
          condition:
            lambda: 'return id(lane_locked);'
          then:
            - logger.log: "Lane locked — ignoring scan"
          else:
            # Publish UID immediately so middleware can start lookup
            - mqtt.publish:
                topic: "nfc/toolhead/${lane_id}"
                payload: !lambda |-
                  return "{\"uid\": \"" + x + "\", \"toolhead\": \"${lane_id}\"}";
            - logger.log:
                format: "Tag scanned on ${lane_id}: %s"
                args: [x.c_str()]
