# =============================================================
# Spoolman Klipper Macros
# =============================================================
# These macros allow Klipper to communicate with Spoolman via
# Moonraker's remote method API.
#
# Add these to your printer.cfg, or save this file and include it:
#   [include spoolman_macros.cfg]
#
# Requires Moonraker to have the [spoolman] section configured:
#   [spoolman]
#   server: http://YOUR_SPOOLMAN_IP:7912
#   sync_rate: 5
#
# Single toolhead users: this file includes everything you need —
# SET_ACTIVE_SPOOL, CLEAR_ACTIVE_SPOOL, and a restore macro that
# re-activates your last spool after a Klipper restart.
#
# Toolchanger users: you also need toolhead_macros_example.cfg
# for per-toolhead spool tracking and the multi-tool restore macro.
# =============================================================

# SET_ACTIVE_SPOOL
# Called automatically by toolhead macros (T0-T3) when a toolchange occurs.
# Also called by the NFC middleware via Moonraker's gcode script API.
# Usage: SET_ACTIVE_SPOOL ID=1
[gcode_macro SET_ACTIVE_SPOOL]
description: Set the active spool in Spoolman via Moonraker
gcode:
  {% if params.ID is defined %}
    # Call Moonraker's remote method to update the active spool in Spoolman
    {action_call_remote_method("spoolman_set_active_spool", spool_id=params.ID|int)}
  {% endif %}

# CLEAR_ACTIVE_SPOOL
# Call this at the end of a print to clear the active spool tracking.
# Add to your END_PRINT macro: CLEAR_ACTIVE_SPOOL
[gcode_macro CLEAR_ACTIVE_SPOOL]
description: Clear the active spool in Spoolman
gcode:
  # Pass None to Moonraker to deactivate spool tracking
  {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}

# =============================================================
# Restore Spool After Reboot (Single Toolhead)
# =============================================================
# Runs automatically 1 second after Klipper starts.
# Reads the last saved spool ID from disk and re-activates it
# in Spoolman, so you don't have to rescan after a reboot.
#
# The middleware saves the spool ID via SAVE_VARIABLE every time
# an NFC scan occurs, so this always has the latest value.
#
# Requires [save_variables] in printer.cfg, e.g.:
#   [save_variables]
#   filename: ~/printer_data/config/variables.cfg
#
# Toolchanger users: this macro is NOT needed — use the
# RESTORE_SPOOL_IDS macro in toolhead_macros_example.cfg instead,
# which restores all toolheads (T0–T3).
# =============================================================
[delayed_gcode RESTORE_SPOOL]
initial_duration: 1
gcode:
  {% set svv = printer.save_variables.variables %}
  {% if svv.t0_spool_id is defined %}
    SET_ACTIVE_SPOOL ID={svv.t0_spool_id}
  {% endif %}
