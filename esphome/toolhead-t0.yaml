# =============================================================
# Toolhead T0 — edit this file for T0-specific settings
# All shared logic lives in base-pn532.yaml — do not duplicate it here.
# =============================================================

substitutions:
  toolhead_id: "T0"
  friendly_name: "Toolhead T0 NFC"

esphome:
  name: toolhead-t0
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  name_add_mac_suffix: false

packages:
  base: !include base-pn532.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Static IP prevents OTA upload failures due to DHCP address changes
  manual_ip:
    static_ip: 192.168.X.X   # Set your desired static IP for this device
    gateway: 192.168.X.1      # Usually your router IP
    subnet: 255.255.255.0
  # Fallback hotspot — activates if WiFi connection fails
  # Connect to this and visit 192.168.4.1 to reconfigure WiFi
  ap:
    ssid: "Toolhead-T0 Fallback"
    password: "CHANGE_ME"
